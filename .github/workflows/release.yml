name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish (self-contained single-file)
        shell: pwsh
        run: |
          dotnet publish src/PerAsperaLauncher/PerAsperaLauncher.csproj `
            -c Release -r win-x64 --self-contained `
            -p:PublishSingleFile=true `
            -o publish
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Package
        shell: pwsh
        run: |
          Compress-Archive -Path publish\PerAsperaLauncher.exe -DestinationPath "PerAsperaLauncher-$env:GITHUB_REF_NAME.zip"
          Get-ChildItem *.zip | ForEach-Object { Write-Host "$($_.Name) ($([math]::Round($_.Length/1MB,1)) MB)" }

      - name: Create release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create $env:GITHUB_REF_NAME `
            "PerAsperaLauncher-$env:GITHUB_REF_NAME.zip#Per Aspera Mod Launcher (Windows x64, aucun prerequis)" `
            --title "Per Aspera Mod Launcher $env:GITHUB_REF_NAME" `
            --generate-notes
